name: Bug report
description: Report a reproducible defect
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. For security issues, use [Security Advisories](https://github.com/mertcaliskanlinux/upmarto/security/advisories/new) instead.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Backend server
        - Rust SDK (upmarto-sdk)
        - CLI (upmarto-cli)
        - TypeScript SDK (@upmarto/sdk)
        - Cursor hooks (@upmarto/cursor)
        - VS Code extension
        - Web UI
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Upmarto version, crate version, or npm package version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug
      placeholder: |
        1. cargo run
        2. upmarto-cli init
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Terminal output, stderr, or relevant config (redact secrets)
      render: shell

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
