name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

defaults:
  run:
    working-directory: agent-blackbox

jobs:
  backend-core:
    name: Backend core (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: agent-blackbox

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --all-targets

  frontend-ui:
    name: Frontend UI (build)
    runs-on: ubuntu-latest
    needs: backend-core
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: agent-blackbox/ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: agent-blackbox/ui

      - name: npm run build
        run: npm run build
        working-directory: agent-blackbox/ui
